name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: "arc-runners"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: dist freshness
        run: |
          npm run build
          npm run build:cli
          if ! git diff --exit-code dist dist-cli; then
            echo "::error::dist/ or dist-cli/ is stale. Run 'npm run build && npm run build:cli' and commit." && exit 1
          fi
      - name: docker build (smoke)
        run: docker build -t naoru:ci .
