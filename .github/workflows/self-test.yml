name: self-test
on: pull_request
permissions:
  contents: read
  pull-requests: write
  actions: read
jobs:
  break:
    runs-on: ubuntu-latest
    steps:
      # Domain test: Docker build failure (apt-get on an Alpine base = wrong pkg manager).
      - run: |
          cat > Dockerfile.test <<'EOF'
          FROM alpine:3.20
          RUN apt-get update && apt-get install -y curl
          EOF
          docker build -f Dockerfile.test .
  doctor:
    needs: [break]
    if: ${{ always() && needs.break.result == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          api-key: ${{ secrets.NAORU_LLM_KEY }}
          provider: openrouter
          model: openai/gpt-4o
          failed-job-name: break
