name: self-test
on: pull_request
permissions:
  contents: read
  pull-requests: write
  actions: read
jobs:
  break:
    runs-on: ubuntu-latest
    steps:
      - run: echo "intentionally failing for naoru dogfood" && exit 1
  doctor:
    needs: [break]
    if: ${{ always() && needs.break.result == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          api-key: ${{ secrets.NAORU_LLM_KEY }}
          provider: anthropic
