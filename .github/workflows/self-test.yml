name: self-test
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
  actions: read
jobs:
  break:
    runs-on: "arc-runners"
    steps:
      # The runner image has no Node preinstalled; without this the job fails
      # with "node: command not found" instead of the intended TypeError.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # A real, diagnosable failure: TypeError on an undefined value.
      - run: node -e "const user = undefined; console.log('user id is', user.id)"
  doctor:
    needs: [break]
    if: ${{ always() && needs.break.result == 'failure' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: "arc-runners"
    steps:
      - uses: actions/checkout@v7
      - uses: ./
        with:
          api-key: ${{ secrets.NAORU_LLM_KEY }}
          provider: openrouter
          model: openai/gpt-4o
          failed-job-name: break
          fix-mode: suggest
