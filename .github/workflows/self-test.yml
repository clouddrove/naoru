name: self-test
on: pull_request
permissions:
  contents: read
  pull-requests: write
  actions: read
jobs:
  break:
    runs-on: ubuntu-latest
    steps:
      # Domain test: Terraform validate failure (unsupported argument).
      - run: |
          cat > main.tf <<'EOF'
          resource "local_file" "example" {
            content          = "hello"
            filename         = "${path.module}/out.txt"
            invalid_argument = true
          }
          EOF
          terraform init -backend=false
          terraform validate
  doctor:
    needs: [break]
    if: ${{ always() && needs.break.result == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          api-key: ${{ secrets.NAORU_LLM_KEY }}
          provider: openrouter
          model: openai/gpt-4o
          failed-job-name: break
