name: release
on:
  push:
    tags: ['v*.*.*']
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci && npm run build && npm run build:cli
      - name: verify dist committed
        run: git diff --exit-code dist dist-cli
      - uses: softprops/action-gh-release@v3
      - name: log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build + push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/clouddrove/naoru:${{ github.ref_name }}
            ghcr.io/clouddrove/naoru:latest
      - name: move major tag
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"
          git tag -f "$MAJOR" && git push -f origin "$MAJOR"
